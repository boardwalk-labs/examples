name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Daily run so template rot (or registry drift) surfaces without a PR. The hosted-platform
    # parity leg needs an account and is verified platform-side, not here — see SPEC §4.
    - cron: "17 9 * * *"

env:
  # Run JS actions on Node 24 now (GitHub forces this 2026-06-16); a no-op once it is the default.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install the Boardwalk CLI + engine
        id: install
        # Both come from npm. The CLI's `build` and the engine's workflows-dir boot-load power the
        # server-mode leg; don't hard-fail on a 404 — the harness is skipped below until both
        # publish, at which point this install succeeds and both modes run with no further change.
        continue-on-error: true
        run: npm install -g @boardwalk-labs/cli @boardwalk-labs/engine
      - name: Run the template harness (dev + server modes)
        if: steps.install.outcome == 'success'
        env:
          BOARDWALK_SERVER: boardwalk-server
        run: node harness/run.mjs
      - name: Harness skipped (packages not published yet)
        if: steps.install.outcome != 'success'
        run: echo "::warning title=Harness skipped::@boardwalk-labs/cli or @boardwalk-labs/engine is not on npm yet — skipping the template harness. It runs once both publish."
